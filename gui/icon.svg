<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#bg)"/>
  <!-- Stylised "D" for Deconvolve -->
  <text x="32" y="46" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif"
        font-size="40" font-weight="bold" fill="#fff" letter-spacing="-2">D</text>
  <!-- Small wave/point-spread hint (three concentric arcs) -->
  <circle cx="46" cy="16" r="4" fill="none" stroke="#80D8FF" stroke-width="1.5" opacity="0.9"/>
  <circle cx="46" cy="16" r="8" fill="none" stroke="#80D8FF" stroke-width="1" opacity="0.5"/>
  <circle cx="46" cy="16" r="12" fill="none" stroke="#80D8FF" stroke-width="0.7" opacity="0.3"/>
</svg>
